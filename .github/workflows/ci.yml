name: CI

on:
  push:
    branches: [main, "codex/**", "feat/**"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Unit Tests
        run: npm test

      - name: BDD Tests
        run: npm run test:bdd

      - name: Build Binary
        run: npm run build:bin

      - name: Binary Smoke
        run: ./dist/spanory-linux-x64 --help
